  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Space+Mono:wght@400;700&display=swap');

    /* FULL HEIGHT FIX */
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      background: #080808;
      overflow: hidden;
    }

    *, *::before, *::after { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
    }

    .stage {
      width: 100%; 
      height: 100vh; 
      min-height: 100vh;
      background: #080808;
      display: flex; 
      align-items: center; 
      justify-content: center;
      perspective: 1200px; 
      overflow: hidden; 
      cursor: crosshair;
    }

    .card-wrap {
      width: min(92%, 520px); 
      aspect-ratio: 3.5 / 2;
      position: relative; 
      transform-style: preserve-3d; 
      border-radius: 16px;
    }

    .card-inner {
      width: 100%; height: 100%; border-radius: 16px; overflow: hidden;
      position: relative; background: #0d0818;
      box-shadow: 0 40px 100px rgba(0,0,0,0.85), 0 0 0 1px rgba(255,255,255,0.07);
      transition: background 0.4s;
    }
    .light .card-inner { background: #f0ebe0; }

    /* RESPONSIVE CARD CONTENT */
    .card-content {
      position: absolute; inset: 0; z-index: 5;
      padding: 5% 6% 4% 6%;
      display: flex; 
      flex-direction: column;
      font-family: 'Space Mono', monospace;
    }

    .badge {
      display: inline-block;
      background: rgba(165,127,255,0.22); color: #d4b8ff;
      font-size: clamp(10px, 2.6vw, 13px);
      letter-spacing: 1px; 
      padding: 3px 9px;
      border-radius: 2px; 
      margin-bottom: 6px; 
      text-transform: uppercase;
      border: 0.5px solid rgba(165,127,255,0.3);
    }
    .light .badge { background: rgba(26,26,26,0.85); color: #f5f0e8; border-color: transparent; }

    .card-name {
      font-family: 'Playfair Display', serif;
      font-size: clamp(26px, 7.5vw, 42px);
      color: #fff; 
      margin-bottom: 2px; 
      line-height: 1.05;
      text-shadow: 0 2px 16px rgba(0,0,0,0.8);
    }
    .light .card-name { color: #1a1a1a; text-shadow: none; }

    .card-title {
      font-size: clamp(10px, 2.8vw, 13px);
      color: rgba(200,180,255,0.9);
      letter-spacing: 1.8px; 
      text-transform: uppercase; 
      margin-bottom: 12px;
    }
    .light .card-title { color: #555; }

    .info-row {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 10px; 
      border-radius: 5px; 
      margin-bottom: 5px;
      width: 100%;
      background: rgba(10,5,25,0.45); 
      border: 0.5px solid rgba(165,127,255,0.18);
      backdrop-filter: blur(6px); 
      font-size: clamp(11.5px, 3.1vw, 13.5px); 
      color: rgba(235,225,255,0.95);
    }
    .light .info-row { background: rgba(255,255,255,0.55); border-color: rgba(26,26,26,0.1); color: #1a1a1a; }
    .info-arr { color: #a57eff; flex-shrink: 0; }
    .light .info-arr { color: #555; }

    .services-label {
      font-size: clamp(9px, 2.4vw, 11px); 
      letter-spacing: 2px; 
      text-transform: uppercase;
      margin-bottom: 6px; 
      color: rgba(165,127,255,0.7);
    }
    .light .services-label { color: #999; }

    .service-item {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 10px; 
      border-radius: 5px; 
      margin-bottom: 5px;
      width: 100%;
      background: rgba(10,5,25,0.45); 
      border: 0.5px solid rgba(165,127,255,0.18);
      backdrop-filter: blur(6px); 
      font-size: clamp(11.5px, 3.1vw, 13.5px);
    }
    .light .service-item { background: rgba(255,255,255,0.55); border-color: rgba(26,26,26,0.1); }
    .service-dot { width: 4px; height: 4px; border-radius: 50%; background: #a57eff; flex-shrink: 0; }
    .light .service-dot { background: #1a1a1a; }
    .service-name { color: rgba(220,210,255,0.95); }
    .light .service-name { color: #2a2a2a; }

    /* Landscape adjustments */
    @media (max-height: 520px) {
      .card-content { padding: 4% 6% 3% 6%; }
      .card-name { font-size: 28px; }
    }

    .phoenix-wrap {
      position: absolute; bottom: -6%; right: -3%;
      width: 46%; height: 106%;
      z-index: 1; pointer-events: none; overflow: hidden;
    }
    .phoenix-wrap svg { width: 100%; height: 100%; }

    .bg-overlay {
      position: absolute; inset: 0; z-index: 2;
      background: linear-gradient(95deg, rgba(8,4,18,0.92) 0%, rgba(8,4,18,0.74) 44%, rgba(8,4,18,0.18) 68%, transparent 100%);
      transition: background 0.4s;
    }
    .light .bg-overlay {
      background: linear-gradient(95deg, rgba(240,235,224,0.96) 0%, rgba(240,235,224,0.80) 44%, rgba(240,235,224,0.18) 68%, transparent 100%);
    }

    .glare { position: absolute; inset: 0; border-radius: 16px; pointer-events: none; z-index: 6; }

    .card-body { flex: 1; min-height: 0; }

    .card-toggle {
      position: absolute; top: 4%; right: 5%;
      width: 26px; height: 26px; border-radius: 50%;
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; background: rgba(255,255,255,0.15);
      backdrop-filter: blur(8px); z-index: 20; transition: background 0.3s;
    }
    .light .card-toggle { background: rgba(26,26,26,0.85); }

    .card-nav {
      flex-shrink: 0; margin-top: 6px;
      display: flex; align-items: center; justify-content: center; position: relative; z-index: 10;
    }

    .toolbar {
      display: flex; align-items: center;
      border-radius: 26px; padding: 5px; position: relative;
      background: rgba(15,10,30,0.60);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 0.5px solid rgba(255,255,255,0.12);
      transition: background 0.3s, border-color 0.3s;
    }
    .light .toolbar {
      background: rgba(255,252,245,0.92);
      border-color: rgba(180,170,155,0.55);
      box-shadow: 0 2px 12px rgba(160,140,100,0.18);
    }

    .divider { width: 1px; height: 22px; flex-shrink: 0; background: rgba(255,255,255,0.12); transition: background 0.3s; }
    .light .divider { background: rgba(160,145,120,0.30); }

    .nav-btn {
      position: relative; width: 50px; height: 50px;
      border: none; background: transparent; cursor: pointer;
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      z-index: 2; transition: transform 0.15s; flex-shrink: 0;
    }
    .nav-btn:active { transform: scale(0.90); }

    .nav-icon {
      width: 24px; height: 24px; fill: none;
      stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round;
      stroke: rgba(255,255,255,0.40); transition: stroke 0.2s; pointer-events: none;
    }
    .nav-btn.active .nav-icon { stroke: rgba(255,255,255,0.95); }
    .light .nav-btn .nav-icon { stroke: rgba(80,70,55,0.35); }
    .light .nav-btn.active .nav-icon { stroke: rgba(30,20,10,0.88); }

    .indicator {
      position: absolute; top: 5px; left: 5px;
      width: 50px; height: 50px; border-radius: 18px;
      pointer-events: none; z-index: 1;
      transition: left 0.45s cubic-bezier(0.34,1.2,0.64,1);
    }
    .ind-glow { position: absolute; inset: -5px; border-radius: 23px; opacity: 0.20; filter: blur(6px); transition: background 0.4s; }
    .ind-clip { position: absolute; inset: 0; border-radius: 18px; overflow: hidden; }
    .ind-spin {
      position: absolute; width: 200%; height: 200%; top: -50%; left: -50%;
      border-radius: 50%; animation: spin-ring 4.5s linear infinite;
    }
    .gold { background: conic-gradient(#533517 0%,#c49746 8%,#feeaa5 14%,#fff 15.5%,#ffc0cb 17%,#feeaa5 18.5%,#c49746 24%,#e8af48 30%,#feeaa5 36%,#fff 37.5%,#87ceeb 39%,#feeaa5 40.5%,#c49746 46%,#e8af48 52%,#feeaa5 57%,#fff 58.5%,#ffc0cb 60%,#feeaa5 61.5%,#c49746 68%,#e8af48 74%,#feeaa5 79%,#fff 80.5%,#87ceeb 82%,#feeaa5 83.5%,#c49746 90%,#533517 100%); }
    .silver { background: conic-gradient(#8a8a8a 0%,#d8d8d8 8%,#fff 14%,#fff 15.5%,#c8d4e0 17%,#e8e8e8 18.5%,#b0b0b0 24%,#d0d0d0 30%,#f5f5f5 36%,#fff 37.5%,#dce8f0 39%,#e8e8e8 40.5%,#b8b8b8 46%,#d8d8d8 52%,#f0f0f0 57%,#fff 58.5%,#c8d4e0 60%,#e0e0e0 61.5%,#a8a8a8 68%,#ccc 74%,#f0f0f0 79%,#fff 80.5%,#dce8f0 82%,#e8e8e8 83.5%,#b0b0b0 90%,#8a8a8a 100%); }
    @keyframes spin-ring { to { transform: rotate(360deg); } }
    .ind-plate { position: absolute; inset: 2px; border-radius: 16px; background: rgba(15,10,30,0.85); transition: background 0.3s; }
    .light .ind-plate { background: rgba(250,247,240,0.94); }
  </style>
</head>

  <script>
    const root=document.getElementById('root'),stage=document.getElementById('stage'),card=document.getElementById('card'),glare=document.getElementById('glare');
    let dark=true,tRX=0,tRY=0,cRX=0,cRY=0;

    stage.addEventListener('mousemove',e=>{
      const r=stage.getBoundingClientRect();
      tRY=((e.clientX-r.left)/r.width-0.5)*28;
      tRX=-((e.clientY-r.top)/r.height-0.5)*28;
      glare.style.background=`radial-gradient(ellipse at ${(e.clientX-r.left)/r.width*100}% ${(e.clientY-r.top)/r.height*100}%,rgba(255,255,255,0.09) 0%,transparent 55%)`;
    });
    stage.addEventListener('mouseleave',()=>{tRX=tRY=0;});
    (function loop(){cRX+=(tRX-cRX)*0.07;cRY+=(tRY-cRY)*0.07;card.style.transform=`perspective(1200px) rotateX(${cRX}deg) rotateY(${cRY}deg)`;requestAnimationFrame(loop);})();

    function indLeft(tbId,idx){const tb=document.getElementById(tbId),btn=tb.querySelectorAll('.nav-btn')[0],div=tb.querySelector('.divider');return idx===0?5:5+btn.offsetWidth+div.offsetWidth;}
    function setInd(tbId,indId,idx){document.getElementById(indId).style.left=indLeft(tbId,idx)+'px';}

    function goHome(){
      document.getElementById('pg-home').classList.add('active');
      document.getElementById('pg-user').classList.remove('active');
      ['btn0h','btn1h'].forEach(id=>document.getElementById(id).classList.add('active'));
      ['btn0u','btn1u'].forEach(id=>document.getElementById(id).classList.remove('active'));
      setInd('tb0','ind0',0);setInd('tb1','ind1',0);
    }
    function goUser(){
      document.getElementById('pg-user').classList.add('active');
      document.getElementById('pg-home').classList.remove('active');
      ['btn0u','btn1u'].forEach(id=>document.getElementById(id).classList.add('active'));
      ['btn0h','btn1h'].forEach(id=>document.getElementById(id).classList.remove('active'));
      setInd('tb0','ind0',1);setInd('tb1','ind1',1);
    }
    document.getElementById('btn0h').addEventListener('click',goHome);
    document.getElementById('btn0u').addEventListener('click',goUser);
    document.getElementById('btn1h').addEventListener('click',goHome);
    document.getElementById('btn1u').addEventListener('click',goUser);

    function applyTheme(){
      const sc=dark?'gold':'silver',gc=dark?'#e8af48':'#a8b8cc';
      ['spin0','spin1'].forEach(id=>{document.getElementById(id).className='ind-spin '+sc;});
      ['glow0','glow1'].forEach(id=>{document.getElementById(id).style.background=gc;});
      root.classList.toggle('light',!dark);
      document.getElementById('tog').textContent=dark?'🌙':'☀️';
    }
    document.getElementById('tog').addEventListener('click',()=>{dark=!dark;applyTheme();});

    applyTheme();
    setTimeout(()=>{setInd('tb0','ind0',0);setInd('tb1','ind1',1);},120);
  </script>
