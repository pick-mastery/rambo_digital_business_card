<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Rambo Miller | Digital Business Card</title>

  <!-- RICH PREVIEW -->
  <meta property="og:title" content="Rambo Miller - Digital Business Card">
  <meta property="og:description" content="Website Developer & AI Consultant | Building your business for tomorrow">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://pick-mastery.github.io/rambo_digital_business_card/">
  <meta property="og:image" content="https://pick-mastery.github.io/rambo_digital_business_card/preview.jpg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">

  <meta name="theme-color" content="#0a0818">
  <meta name="twitter:card" content="summary_large_image">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Space+Mono:wght@400;700&display=swap');

    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      background: #080808;
      overflow: hidden;
    }

    *, *::before, *::after { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
    }

    .stage {
      width: 100%; 
      height: 100dvh; 
      background: #080808;
      display: flex; 
      align-items: center; 
      justify-content: center;
      perspective: 1200px; 
      overflow: hidden; 
      cursor: crosshair;
    }

    .card-wrap {
      width: min(92%, 520px); 
      aspect-ratio: 3.5 / 2;
      position: relative; 
      transform-style: preserve-3d; 
      border-radius: 16px;
    }

    .card-inner {
      width: 100%; height: 100%; border-radius: 16px; overflow: hidden;
      position: relative; background: #0d0818;
      box-shadow: 0 40px 100px rgba(0,0,0,0.85), 0 0 0 1px rgba(255,255,255,0.07);
      transition: background 0.4s;
    }
    .light .card-inner { background: #f0ebe0; }

    /* PHOENIX ON TOP */
    .phoenix-wrap {
      position: absolute; 
      bottom: -6%; 
      right: -3%;
      width: 46%; 
      height: 106%;
      z-index: 4; 
      pointer-events: none; 
      overflow: hidden;
    }
    .phoenix-wrap svg { width: 100%; height: 100%; }

    .bg-overlay {
      position: absolute; inset: 0; z-index: 2;
      background: linear-gradient(95deg, rgba(8,4,18,0.92) 0%, rgba(8,4,18,0.74) 44%, rgba(8,4,18,0.18) 68%, transparent 100%);
    }
    .light .bg-overlay {
      background: linear-gradient(95deg, rgba(240,235,224,0.96) 0%, rgba(240,235,224,0.80) 44%, rgba(240,235,224,0.18) 68%, transparent 100%);
    }

    .glare { position: absolute; inset: 0; border-radius: 16px; pointer-events: none; z-index: 6; }

    .card-content {
      position: absolute; inset: 0; z-index: 5;
      padding: 5% 6% 4% 6%;
      display: flex; 
      flex-direction: column;
      font-family: 'Space Mono', monospace;
    }

    .badge {
      font-size: clamp(10px, 2.6vw, 13px);
      padding: 3px 9px;
    }

    .card-name {
      font-size: clamp(26px, 7.8vw, 42px);
      line-height: 1.05;
    }

    .card-title {
      font-size: clamp(10px, 2.8vw, 13px);
      letter-spacing: 1.8px;
      margin-bottom: 12px;
    }

    .info-row, .service-item {
      font-size: clamp(11.5px, 3.2vw, 13.5px);
      padding: 6px 10px;
      margin-bottom: 5px;
      width: 100%;
    }

    .services-label {
      font-size: clamp(9px, 2.5vw, 11px);
    }

    /* Landscape fix */
    @media (max-height: 520px) {
      .card-content { padding: 4% 6% 3% 6%; }
      .card-name { font-size: 28px; }
    }

    .card-body { flex: 1; min-height: 0; }

    .card-toggle {
      position: absolute; top: 4%; right: 5%;
      width: 28px; height: 28px; border-radius: 50%;
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; background: rgba(255,255,255,0.15);
      backdrop-filter: blur(8px); z-index: 20;
    }
    .light .card-toggle { background: rgba(26,26,26,0.85); }

    /* Toolbar styles (unchanged) */
    .card-nav { flex-shrink: 0; margin-top: 6px; display: flex; align-items: center; justify-content: center; position: relative; z-index: 10; }

    .toolbar {
      display: flex; align-items: center;
      border-radius: 26px; padding: 5px; position: relative;
      background: rgba(15,10,30,0.60);
      backdrop-filter: blur(20px);
      border: 0.5px solid rgba(255,255,255,0.12);
    }
    .light .toolbar { background: rgba(255,252,245,0.92); border-color: rgba(180,170,155,0.55); }

    .nav-btn {
      position: relative; width: 50px; height: 50px;
      border: none; background: transparent; cursor: pointer;
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      z-index: 2; transition: transform 0.15s;
    }
    .nav-btn:active { transform: scale(0.90); }

    .nav-icon {
      width: 24px; height: 24px; stroke: rgba(255,255,255,0.40); transition: stroke 0.2s;
    }
    .nav-btn.active .nav-icon { stroke: rgba(255,255,255,0.95); }
    .light .nav-btn .nav-icon { stroke: rgba(80,70,55,0.35); }
    .light .nav-btn.active .nav-icon { stroke: rgba(30,20,10,0.88); }

    /* Indicator styles */
    .indicator, .ind-glow, .ind-clip, .ind-spin, .gold, .silver, .ind-plate, .divider { /* your existing styles */ }
  </style>
</head>

<body>
  <div class="stage" id="stage">
    <div class="card-wrap" id="card">
      <div class="card-inner" id="root">

        <!-- Phoenix - higher z-index so it appears on top of text -->
        <div class="phoenix-wrap">
          <svg viewBox="0 0 1064.7979 1064.7979" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
            <!-- Full phoenix SVG (unchanged) -->
            <defs>
              <style>.c9{fill:url(#g33)}.c10{fill:url(#g48)}.c11,.c12,.c16,.c17{fill:none;stroke:#000;stroke-linecap:round;stroke-linejoin:round}.c11{stroke-width:5px}.c12{stroke-width:3px}.c13{fill:#e1eaef}.c14{fill:#8286a8}.c15{fill:url(#g42)}.c16{stroke-width:1.88px}.c17{stroke-width:1.5px}</style>
              <linearGradient id="g33" x1="426.72" y1="772.58" x2="1090.03" y2="772.58" gradientUnits="userSpaceOnUse"><stop offset=".58" stop-color="#e1eaef"/><stop offset=".84" stop-color="#4f5c6e"/></linearGradient>
              <linearGradient id="g48" x1="757.67" y1="366.76" x2="759.79" y2="853.82" gradientUnits="userSpaceOnUse"><stop offset=".09" stop-color="#666"/><stop offset=".61" stop-color="#000"/></linearGradient>
              <linearGradient id="g42" x1="764.28" y1="645.77" x2="750.19" y2="589.26" gradientUnits="userSpaceOnUse"><stop offset=".26" stop-color="#8286a8"/><stop offset=".6" stop-color="#e1eaef"/></linearGradient>
            </defs>
            <g transform="translate(54.406783,-207.43322)">
              <!-- All your path elements here (same as before) -->
              <path class="c9" d="m 758.26,1136.24 c -87.83,0 -193.94,-173.16 -238,-244.38 ... z" transform="translate(-296.53,-16.45)"/>
              <!-- (All other paths from your original SVG) -->
            </g>
          </svg>
        </div>

        <div class="bg-overlay"></div>
        <div class="glare" id="glare"></div>

        <div class="card-content">
          <button class="card-toggle" id="tog">🌙</button>

          <!-- HOME PAGE -->
          <div class="page active" id="pg-home">
            <div class="card-body">
              <div class="badge">Website Developer</div>
              <div class="card-name">Rambo Miller</div>
              <div class="card-title">Building your business for tomorrow</div>
              <div class="info-row"><span class="info-arr">›</span>(432) 267-1030</div>
              <div class="info-row"><span class="info-arr">›</span>rambosguitarlessons@gmail.com</div>
              <div class="info-row"><span class="info-arr">›</span>pickmastery.com</div>
            </div>
            <div class="card-nav">
              <div class="toolbar" id="tb0">
                <div class="indicator" id="ind0">
                  <div class="ind-glow" id="glow0" style="background:#e8af48"></div>
                  <div class="ind-clip"><div class="ind-spin gold" id="spin0"></div></div>
                  <div class="ind-plate"></div>
                </div>
                <button class="nav-btn active" id="btn0h">🏠</button>
                <div class="divider"></div>
                <button class="nav-btn" id="btn0u">👤</button>
              </div>
            </div>
          </div>

          <!-- SERVICES PAGE -->
          <div class="page" id="pg-user">
            <div class="card-body">
              <div class="services-label">Services</div>
              <div class="service-item"><div class="service-dot"></div><span class="service-name">Website Development</span></div>
              <div class="service-item"><div class="service-dot"></div><span class="service-name">Custom Software Design</span></div>
              <div class="service-item"><div class="service-dot"></div><span class="service-name">Search Engine Optimization</span></div>
              <div class="service-item"><div class="service-dot"></div><span class="service-name">Content Generation</span></div>
              <div class="service-item"><div class="service-dot"></div><span class="service-name">A.I. Consultant</span></div>
            </div>
            <div class="card-nav">
              <div class="toolbar" id="tb1">
                <div class="indicator" id="ind1">
                  <div class="ind-glow" id="glow1" style="background:#e8af48"></div>
                  <div class="ind-clip"><div class="ind-spin gold" id="spin1"></div></div>
                  <div class="ind-plate"></div>
                </div>
                <button class="nav-btn" id="btn1h">🏠</button>
                <div class="divider"></div>
                <button class="nav-btn active" id="btn1u">👤</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const root = document.getElementById('root');
    const stage = document.getElementById('stage');
    const card = document.getElementById('card');
    const glare = document.getElementById('glare');
    let dark = true, tRX = 0, tRY = 0, cRX = 0, cRY = 0;

    // Mouse tilt
    stage.addEventListener('mousemove', e => {
      const r = stage.getBoundingClientRect();
      tRY = ((e.clientX - r.left) / r.width - 0.5) * 28;
      tRX = -((e.clientY - r.top) / r.height - 0.5) * 28;
      glare.style.background = `radial-gradient(ellipse at ${(e.clientX-r.left)/r.width*100}% ${(e.clientY-r.top)/r.height*100}%, rgba(255,255,255,0.09) 0%, transparent 55%)`;
    });
    stage.addEventListener('mouseleave', () => { tRX = tRY = 0; });

    (function loop() {
      cRX += (tRX - cRX) * 0.07;
      cRY += (tRY - cRY) * 0.07;
      card.style.transform = `perspective(1200px) rotateX(${cRX}deg) rotateY(${cRY}deg)`;
      requestAnimationFrame(loop);
    })();

    // Navigation
    function goHome() {
      document.getElementById('pg-home').classList.add('active');
      document.getElementById('pg-user').classList.remove('active');
      ['btn0h','btn1h'].forEach(id => document.getElementById(id).classList.add('active'));
      ['btn0u','btn1u'].forEach(id => document.getElementById(id).classList.remove('active'));
    }
    function goUser() {
      document.getElementById('pg-user').classList.add('active');
      document.getElementById('pg-home').classList.remove('active');
      ['btn0u','btn1u'].forEach(id => document.getElementById(id).classList.add('active'));
      ['btn0h','btn1h'].forEach(id => document.getElementById(id).classList.remove('active'));
    }

    document.getElementById('btn0h').addEventListener('click', goHome);
    document.getElementById('btn0u').addEventListener('click', goUser);
    document.getElementById('btn1h').addEventListener('click', goHome);
    document.getElementById('btn1u').addEventListener('click', goUser);

    // Theme toggle
    function applyTheme() {
      const sc = dark ? 'gold' : 'silver';
      const gc = dark ? '#e8af48' : '#a8b8cc';
      ['spin0','spin1'].forEach(id => document.getElementById(id).className = 'ind-spin ' + sc);
      ['glow0','glow1'].forEach(id => document.getElementById(id).style.background = gc);
      root.classList.toggle('light', !dark);
      document.getElementById('tog').textContent = dark ? '🌙' : '☀️';
    }
    document.getElementById('tog').addEventListener('click', () => { dark = !dark; applyTheme(); });

    applyTheme();
  </script>
</body>
</html>
